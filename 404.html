<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>404 - 页面去远方了 | Thoughts & Notes</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a2e;
    --muted: #6b7280;
    --accent: #6366f1;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #0f0f1a; --fg: #f5f5f7; --muted: #9ca3af; --accent: #8b8df0; }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .illustration {
    width: 280px;
    max-width: 70vw;
    height: auto;
    margin-bottom: 32px;
    user-select: none;
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 12px;
  }
  p {
    color: var(--muted);
    max-width: 420px;
    line-height: 1.6;
    margin-bottom: 28px;
    font-size: 15px;
  }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  a.btn {
    display: inline-block;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    text-decoration: none;
    transition: opacity .15s, transform .15s;
  }
  a.btn:hover { opacity: 0.85; transform: translateY(-1px); }
  a.primary { background: var(--accent); color: #fff; }
  a.ghost {
    border: 1px solid var(--muted);
    color: var(--fg);
  }
</style>
</head>
<body>
<div class="wrap">
  <img class="illustration" src="/images/404-lost.png?v=15" alt="404">
  <h1>页面去远方了</h1>
  <p>你访问的链接可能已经迁移或失效。<br>不如回首页看看，或者从归档里翻翻。</p>
  <div class="actions">
    <a class="btn primary" href="/">回首页</a>
    <a class="btn ghost" href="/archives">看归档</a>
  </div>
</div>
</body>
</html>
